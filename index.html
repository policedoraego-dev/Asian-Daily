<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asian Daily — アジア語フレーズ帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────────── */
    :root {
      --bg:           #EDFAF3;
      --bg-card:      #FFFFFF;
      --bg-section:   #F4FDF8;
      --green:        #1C6647;
      --green-mid:    #2E8B5A;
      --green-light:  #B2EDD0;
      --green-xlight: #E2F5EC;
      --yellow:       #FFD23F;
      --yellow-light: #FFF8D6;
      --yellow-dark:  #C9920A;
      --text:         #182F22;
      --text-2:       #3F6650;
      --text-3:       #7CA98C;
      --border:       #CAE9D8;
      --border-2:     #E6F5ED;
      --shadow-sm:    0 2px 8px rgba(28,102,71,0.07);
      --shadow-md:    0 6px 28px rgba(28,102,71,0.13);
      --shadow-lg:    0 16px 56px rgba(28,102,71,0.18);
      --r-lg:         22px;
      --r-md:         14px;
      --r-sm:         9px;
    }

    /* ── Reset & Base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: var(--green);
      padding: 18px 20px 0;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    .hd-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-globe {
      font-size: 30px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .logo-texts { display: flex; flex-direction: column; gap: 1px; }

    .logo-name {
      font-size: 21px;
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: -0.6px;
      line-height: 1;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--green-light);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .hd-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      color: var(--green-light);
    }

    .stat-pill b { color: #fff; }

    .cfg-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: var(--r-sm);
      padding: 6px 12px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }

    .cfg-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-ico {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: var(--r-md);
      padding: 10px 14px 10px 40px;
      font-size: 14px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.38); }

    .search-input:focus {
      background: rgba(255,255,255,0.17);
      border-color: var(--yellow);
    }

    /* ── Category Bar ─────────────────────────────────────── */
    .cat-bar {
      background: var(--green);
      padding: 0 20px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .cat-bar::-webkit-scrollbar { display: none; }

    .cat-list {
      display: flex;
      gap: 7px;
      width: max-content;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
      font-family: inherit;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .cat-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .cat-btn.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--green);
      font-weight: 800;
    }

    /* ── Main ────────────────────────────────────────────── */
    main {
      padding: 20px 16px 100px;
      max-width: 820px;
      margin: 0 auto;
    }

    @media (min-width: 640px) {
      main { padding: 24px 24px 100px; }
    }

    /* Section header */
    .sec-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .sec-label {
      font-size: 11.5px;
      font-weight: 800;
      color: var(--text-3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .count-badge {
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 10px;
    }

    /* ── Cards ───────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      gap: 14px;
    }

    .phrase-card {
      background: var(--bg-card);
      border-radius: var(--r-lg);
      padding: 0;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--border-2);
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
      animation: cardIn 0.32s ease both;
    }

    .phrase-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card top strip */
    .card-strip {
      height: 5px;
      background: linear-gradient(90deg, var(--green) 0%, var(--yellow) 100%);
    }

    .card-body { padding: 18px 18px 16px; }

    /* Card header row */
    .card-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 13px;
    }

    .cat-tag {
      font-size: 11px;
      font-weight: 700;
      background: var(--yellow-light);
      color: var(--yellow-dark);
      padding: 3px 10px;
      border-radius: 8px;
      letter-spacing: 0.3px;
    }

    /* Japanese phrase */
    .jp-phrase {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.45;
      color: var(--text);
      letter-spacing: -0.3px;
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 2px dashed var(--border);
    }

    /* Language rows */
    .lang-rows { display: flex; flex-direction: column; gap: 0; }

    .lang-row {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-2);
    }

    .lang-row:last-child { border-bottom: none; padding-bottom: 4px; }

    /* Badge */
    .lang-badge {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      gap: 1px;
      margin-top: 1px;
    }

    .lang-badge .flag { font-size: 17px; }
    .lang-badge .code { font-size: 9px; font-weight: 800; }

    .lang-badge.ko {
      background: var(--green);
      color: #fff;
    }

    .lang-badge.tw {
      background: var(--yellow);
      color: var(--green);
    }

    .lang-content { flex: 1; min-width: 0; }

    .lang-text {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .lang-text.ko { font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; }
    .lang-text.tw { font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif; }

    .phonetic {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 3px;
      letter-spacing: 0.3px;
      font-style: italic;
    }

    /* TTS button */
    .tts-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--border);
      background: var(--bg-section);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      margin-top: 1px;
    }

    .tts-btn:hover {
      background: var(--green-xlight);
      border-color: var(--green-mid);
      transform: scale(1.06);
    }

    .tts-btn.speaking {
      background: var(--yellow);
      border-color: var(--yellow);
      animation: tts-pulse 0.7s infinite ease-in-out;
    }

    @keyframes tts-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    /* ── Word chips ──────────────────────────────────────── */
    .words-block {
      background: var(--bg-section);
      border-top: 1px solid var(--border-2);
      padding: 12px 18px;
    }

    .words-block + .words-block {
      border-top: none;
    }

    .words-label {
      font-size: 10.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-3);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .words-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chip-word { font-weight: 700; color: var(--text); }

    /* ── Explanation ─────────────────────────────────────── */
    .exp-wrap {
      border-top: 1px solid var(--border-2);
    }

    .exp-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-2);
      font-weight: 600;
      transition: background 0.15s;
      text-align: left;
    }

    .exp-toggle:hover { background: var(--bg-section); }

    .exp-arrow {
      font-size: 11px;
      transition: transform 0.2s;
    }

    .exp-arrow.open { transform: rotate(180deg); }

    .exp-body {
      display: none;
      padding: 0 18px 14px;
      font-size: 13px;
      line-height: 1.75;
      color: var(--text-2);
    }

    .exp-body.open { display: block; }

    .exp-body p + p {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-2);
    }

    /* ── Loading ─────────────────────────────────────────── */
    .loading-wrap {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      display: inline-block;
      width: 44px;
      height: 44px;
      border: 3.5px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 18px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; color: var(--text-3); }

    /* ── Empty ───────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-text { font-size: 15px; color: var(--text-3); }

    /* ── Error banner ────────────────────────────────────── */
    .error-banner {
      display: none;
      background: #FFF0F0;
      border: 1.5px solid #FFCDD2;
      border-radius: var(--r-md);
      padding: 14px 18px;
      margin-bottom: 18px;
      font-size: 13px;
      color: #B71C1C;
      line-height: 1.6;
    }

    /* ── Config Modal ────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,24,14,0.6);
      backdrop-filter: blur(4px);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: var(--r-lg);
      padding: 28px 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.22s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 19px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 4px;
    }

    .modal-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 22px;
      line-height: 1.55;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 13px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
    }

    .field input:focus { border-color: var(--green-mid); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-primary {
      flex: 1;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.18s;
    }

    .btn-primary:hover { background: var(--green-mid); }

    .btn-cancel {
      padding: 12px 18px;
      background: var(--bg);
      color: var(--text-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.18s;
    }

    .btn-cancel:hover { background: var(--border); }

    /* ── Modal divider ───────────────────────────────────── */
    .modal-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 14px;
    }

    .modal-divider::before,
    .modal-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .modal-divider span {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── FAB ─────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 22px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 32px;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(28,102,71,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  background 0.18s, box-shadow 0.18s;
    }

    .fab:hover {
      transform: scale(1.1);
      background: var(--green-mid);
      box-shadow: 0 10px 36px rgba(28,102,71,0.55);
    }

    .fab:active { transform: scale(0.94); }

    .fab.open {
      transform: rotate(45deg);
      background: #c0392b;
      box-shadow: 0 6px 24px rgba(192,57,43,0.4);
    }

    /* ── Input Modal (Sheet) ──────────────────────────────── */
    .input-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,24,14,0.55);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 400;
      align-items: flex-end;
      justify-content: center;
    }

    .input-overlay.open { display: flex; }

    .input-modal {
      background: #fff;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      padding: 10px 20px 36px;
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      animation: sheetUp 0.3s cubic-bezier(.32,1,.23,1) both;
    }

    @media (min-width: 600px) {
      .input-overlay { align-items: center; padding: 20px; }
      .input-modal {
        border-radius: var(--r-lg);
        padding: 24px 26px 28px;
        max-width: 560px;
        max-height: 88dvh;
      }
    }

    @keyframes sheetUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .im-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    @media (min-width: 600px) { .im-handle { display: none; } }

    .im-title {
      font-size: 18px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 4px;
    }

    .im-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── Delete button on card ────────────────────────────── */
    .del-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .del-btn:hover {
      background: #FFF0F0;
      border-color: #FFCDD2;
      color: #c0392b;
    }

    /* ── Translation inputs (shared in modal) ─────────────── */
    .tp-input-row {
      display: flex;
      gap: 8px;
    }

    .tp-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: border-color 0.18s;
    }

    .tp-input:focus { border-color: var(--green-mid); background: #fff; }
    .tp-input::placeholder { color: var(--text-3); }

    .tp-btn {
      flex-shrink: 0;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.18s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .tp-btn:hover { background: var(--green-mid); }
    .tp-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .tp-btn .tp-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .tp-btn.loading .tp-spinner { display: inline-block; }
    .tp-btn.loading .tp-ico { display: none; }

    .tp-results {
      display: none;
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tp-results.visible { display: grid; }

    .tp-result-card {
      background: var(--bg-section);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tp-lang-badge {
      flex-shrink: 0;
      font-size: 18px;
      line-height: 1;
    }

    .tp-result-body { flex: 1; min-width: 0; }

    .tp-result-text {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .tp-result-text.ko { font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; }
    .tp-result-text.tw { font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif; }

    .tp-phonetic {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
      font-style: italic;
    }

    .tp-tts {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border: 1.5px solid var(--border);

      cursor: pointer;
      font-size: 14px;
      display: flex;

      justify-content: center;
      transition: background 0.15s;
    }

    .tp-tts:hover { background: var(--green-xlight); }
    .tp-tts.speaking { background: var(--yellow); border-color: var(--yellow); }

    .tp-error {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: #B71C1C;
      padding: 6px 10px;
      background: #FFF0F0;
      border-radius: 8px;
    }

    /* ── Scrollbar styling ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Category select in translate panel ──────────────── */
    .tp-cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tp-cat-label {
      font-size: 10.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-3);
      white-space: nowrap;
    }

    .tp-cat-select {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .tp-cat-select:focus { border-color: var(--green-mid); }

    /* ── Save status row ─────────────────────────────────── */
    .tp-save-status {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 8px;
      align-items: center;
      gap: 6px;
    }

    .tp-save-status.saving {
      display: flex;
      background: var(--yellow-light);
      color: var(--yellow-dark);
    }

    .tp-save-status.success {
      display: flex;
      background: #E8F5E9;
      color: #1B5E20;
    }

    .tp-save-status.error {
      display: flex;
      background: #FFF0F0;
      color: #B71C1C;
    }

    .save-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--yellow-dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Toast ───────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 24px;
      box-shadow: 0 6px 24px rgba(28,102,71,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
'use strict';

/* ── Config storage ─────────────────────────────────────── */
const STORE_KEY = 'asian_daily_v1';

function savedConfig() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || null; }
  catch { return null; }
}

function storeConfig(url, key, openaiKey) {
  localStorage.setItem(STORE_KEY, JSON.stringify({ url, key, openaiKey }));
}

function getOpenAIKey() {
  const cfg = savedConfig();
  return (cfg && cfg.openaiKey) ? cfg.openaiKey : '';
}

/* ── Supabase client ────────────────────────────────────── */
let sb = null;

function initSb(url, key) {
  sb = window.supabase.createClient(url, key);
}

/* ── App state ──────────────────────────────────────────── */
let allPhrases  = [];
let categories  = [];
let activeCat   = 'all';
let searchQuery = '';

/* ── Data loading ───────────────────────────────────────── */
async function loadAll() {
  if (!sb) {
    setLoading(false);
    showError('Supabase に接続されていません。右上の ⚙️ 接続 ボタンから設定してください。');
    return;
  }

  setLoading(true);
  hideError();

  try {
    const [catsResult, phrasesResult] = await Promise.all([
      sb.from('categories_asia').select('*').order('sort_order'),
      sb.from('phrases_asia').select('*').order('created_at', { ascending: false })
    ]);

    if (catsResult.error) throw catsResult.error;
    if (phrasesResult.error) throw phrasesResult.error;

    categories = catsResult.data  || [];
    allPhrases = phrasesResult.data || [];

    document.getElementById('totalCount').textContent = allPhrases.length;

    buildCatBar();
    renderCards();
  } catch (err) {
    showError('データの取得に失敗しました: ' + err.message);
  } finally {
    setLoading(false);
  }
}

/* ── Category bar ───────────────────────────────────────── */
function buildCatBar() {
  const list = document.getElementById('catList');
  list.innerHTML = '';

  const allBtn = makeBtn('all', '🌏 すべて', activeCat === 'all');
  list.appendChild(allBtn);

  categories.forEach(cat => {
    const label = [cat.icon, cat.name].filter(Boolean).join(' ');
    list.appendChild(makeBtn(cat.id, label, activeCat === cat.id));
  });

  // 翻訳パネルのカテゴリ選択も同期
  const sel = document.getElementById('tpCategory');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— 未分類 —</option>';
  categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = [cat.icon, cat.name].filter(Boolean).join(' ');
    sel.appendChild(opt);
  });
  sel.value = prev;
}

function makeBtn(id, label, isActive) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (isActive ? ' active' : '');
  btn.dataset.cat = id;
  btn.textContent = label;
  return btn;
}

document.getElementById('catList').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
});

/* ── Search ─────────────────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderCards();
});

/* ── Render cards ───────────────────────────────────────── */
function renderCards() {
  let list = allPhrases;

  if (activeCat !== 'all') {
    list = list.filter(p => p.category_id === activeCat);
  }

  if (searchQuery) {
    list = list.filter(p =>
      (p.japanese   || '').toLowerCase().includes(searchQuery) ||
      (p.korean     || '').toLowerCase().includes(searchQuery) ||
      (p.taiwanese  || '').toLowerCase().includes(searchQuery) ||
      (p.explanation|| '').toLowerCase().includes(searchQuery)
    );
  }

  document.getElementById('phraseCount').textContent = list.length;

  const grid  = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  const fragment = document.createDocumentFragment();
  list.forEach((p, i) => {
    const card = buildCard(p, i);
    fragment.appendChild(card);
  });
  grid.innerHTML = '';
  grid.appendChild(fragment);
}

/* ── Build card DOM ─────────────────────────────────────── */
function buildCard(p, idx) {
  const cat = categories.find(c => c.id === p.category_id);

  const card = el('div', 'phrase-card');
  card.style.animationDelay = `${Math.min(idx * 0.035, 0.4)}s`;

  /* strip */
  card.appendChild(el('div', 'card-strip'));

  /* body */
  const body = el('div', 'card-body');

  /* header row */
  const hd = el('div', 'card-hd');
  if (cat) {
    const tag = el('span', 'cat-tag');
    tag.textContent = [cat.icon, cat.name].filter(Boolean).join(' ');
    hd.appendChild(tag);
  } else {
    hd.appendChild(el('span'));
  }
  const delBtn = el('button', 'del-btn');
  delBtn.textContent = '🗑';
  delBtn.title = '削除';
  delBtn.addEventListener('click', () => deletePhrase(p.id, card));
  hd.appendChild(delBtn);
  body.appendChild(hd);

  /* japanese */
  const jp = el('div', 'jp-phrase');
  jp.textContent = p.japanese || '';
  body.appendChild(jp);

  /* language rows */
  const rows = el('div', 'lang-rows');

  rows.appendChild(buildLangRow('ko', '🇰🇷', 'KR', p.korean, p.ipa, 'ko-KR'));
  rows.appendChild(buildLangRow('tw', '🇹🇼', 'TW', p.taiwanese, p.ipa_tw, 'zh-TW'));

  body.appendChild(rows);
  card.appendChild(body);

  /* words blocks */
  const wordsKo = normalizeWords(p.words,    ['ko', 'word']);
  const wordsTw = normalizeWords(p.words_tw, ['tw', 'word']);

  if (wordsKo.length) card.appendChild(buildWordsBlock('🇰🇷 単語 (韓国語)', wordsKo, 'ko'));
  if (wordsTw.length) card.appendChild(buildWordsBlock('🇹🇼 単語 (台湾華語)', wordsTw, 'tw'));

  /* explanation */
  if (p.explanation || p.explanation_tw) {
    card.appendChild(buildExplanation(p.explanation, p.explanation_tw, idx));
  }

  return card;
}

function buildLangRow(langClass, flag, code, text, phonetic, ttsLang) {
  const row = el('div', 'lang-row');

  /* badge */
  const badge = el('div', 'lang-badge ' + langClass);
  const flagEl = el('span', 'flag');
  flagEl.textContent = flag;
  const codeEl = el('span', 'code');
  codeEl.textContent = code;
  badge.appendChild(flagEl);
  badge.appendChild(codeEl);
  row.appendChild(badge);

  /* content */
  const content = el('div', 'lang-content');
  const textEl = el('div', 'lang-text ' + langClass);
  textEl.textContent = text || '';
  content.appendChild(textEl);

  if (phonetic) {
    const ph = el('div', 'phonetic');
    ph.textContent = phonetic;
    content.appendChild(ph);
  }

  row.appendChild(content);

  /* TTS button */
  const btn = el('button', 'tts-btn');
  btn.title = `${ttsLang} で読み上げ`;
  btn.textContent = '🔊';
  btn.dataset.text = text || '';
  btn.dataset.lang = ttsLang;
  row.appendChild(btn);

  return row;
}

function buildWordsBlock(title, words, langClass) {
  const block = el('div', 'words-block');

  const label = el('div', 'words-label');
  label.textContent = title;
  block.appendChild(label);

  const chips = el('div', 'words-chips');
  words.forEach(w => {
    const chip = el('div', 'chip');
    const orig = el('span', 'chip-word ' + langClass);
    orig.textContent = w.text;
    chip.appendChild(orig);
    if (w.meaning) {
      const sep = document.createTextNode(' = ');
      chip.appendChild(sep);
      chip.appendChild(document.createTextNode(w.meaning));
    }
    chips.appendChild(chip);
  });

  block.appendChild(chips);
  return block;
}

function buildExplanation(expKo, expTw, idx) {
  const wrap = el('div', 'exp-wrap');

  const toggle = el('button', 'exp-toggle');
  toggle.type = 'button';

  const left = el('span');
  left.textContent = '💡 解説を見る';
  const arrow = el('span', 'exp-arrow');
  arrow.textContent = '▾';

  toggle.appendChild(left);
  toggle.appendChild(arrow);

  const body = el('div', 'exp-body');
  body.id = 'exp-' + idx;

  if (expKo) {
    const p = el('p');
    p.textContent = expKo;
    body.appendChild(p);
  }

  if (expTw) {
    const p = el('p');
    p.textContent = '🇹🇼 ' + expTw;
    body.appendChild(p);
  }

  toggle.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    arrow.classList.toggle('open', open);
    toggle.querySelector('span').textContent = open ? '💡 解説を閉じる' : '💡 解説を見る';
  });

  wrap.appendChild(toggle);
  wrap.appendChild(body);
  return wrap;
}

/* ── TTS (OpenAI tts-1-hd) ──────────────────────────────── */
let activeTtsBtn = null;
let activeAudio  = null;
const ttsCache   = new Map(); // text → blob URL

document.getElementById('cardsGrid').addEventListener('click', e => {
  const btn = e.target.closest('.tts-btn');
  if (!btn) return;
  const text = btn.dataset.text;
  if (!text) return;
  speak(text, btn);
});

async function speak(text, btn) {
  if (!text) return;

  // 同じボタンを再押し → 停止
  if (activeTtsBtn === btn) {
    stopAudio();
    return;
  }

  // 別の音声が再生中なら停止
  stopAudio();

  const apiKey = getOpenAIKey();
  if (!apiKey) return; // キー未設定時は無音で無視

  btn.classList.add('speaking');
  btn.textContent = '⏸';
  activeTtsBtn = btn;

  try {
    let url = ttsCache.get(text);

    if (!url) {
      const res = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: 'tts-1-hd',
          input: text,
          voice: 'nova',
          speed: 0.92
        })
      });
      if (!res.ok) throw new Error('TTS API ' + res.status);
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      ttsCache.set(text, url);
    }

    const audio = new Audio(url);
    activeAudio  = audio;

    const done = () => {
      if (activeTtsBtn === btn) resetTtsBtn(btn);
      activeAudio = null;
    };
    audio.onended = done;
    audio.onerror = done;
    await audio.play();

  } catch {
    resetTtsBtn(btn);
    activeAudio = null;
  }
}

function stopAudio() {
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }
  if (activeTtsBtn) { resetTtsBtn(activeTtsBtn); }
}

function resetTtsBtn(btn) {
  btn.classList.remove('speaking');
  btn.textContent = '🔊';
  if (activeTtsBtn === btn) activeTtsBtn = null;
}

/* ── UI helpers ─────────────────────────────────────────── */
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function setLoading(on) {
  document.getElementById('loadingWrap').style.display = on ? 'block' : 'none';
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = '⚠️ ' + msg;
  b.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}

function normalizeWords(raw, keys) {
  if (!Array.isArray(raw)) return [];
  return raw.map(w => {
    const text = keys.map(k => w[k]).find(v => v) || '';
    return { text, meaning: w.meaning || w.jp || w.japanese || '' };
  }).filter(w => w.text);
}

/* ── Config modal ───────────────────────────────────────── */
document.getElementById('cfgBtn').addEventListener('click', openCfg);
document.getElementById('cancelCfgBtn').addEventListener('click', closeCfg);
document.getElementById('configOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCfg();
});

document.getElementById('saveConfigBtn').addEventListener('click', () => {
  const url       = document.getElementById('cfgUrl').value.trim();
  const key       = document.getElementById('cfgKey').value.trim();
  const openaiKey = document.getElementById('cfgOpenAI').value.trim();

  if (!url || !key) {
    alert('Supabase URL と Anon Key を入力してください。');
    return;
  }

  storeConfig(url, key, openaiKey);
  initSb(url, key);
  closeCfg();
  loadAll();
});

function openCfg() {
  const cfg = savedConfig();
  if (cfg) {
    document.getElementById('cfgUrl').value    = cfg.url       || '';
    document.getElementById('cfgKey').value    = cfg.key       || '';
    document.getElementById('cfgOpenAI').value = cfg.openaiKey || '';
  }
  document.getElementById('configOverlay').classList.add('open');
}

function closeCfg() {
  document.getElementById('configOverlay').classList.remove('open');
}

/* ── FAB & Input Modal ──────────────────────────────────── */
const fab          = document.getElementById('fab');
const inputOverlay = document.getElementById('inputOverlay');

fab.addEventListener('click', () => {
  inputOverlay.classList.contains('open') ? closeInputModal() : openInputModal();
});

inputOverlay.addEventListener('click', e => {
  if (e.target === inputOverlay) closeInputModal();
});

function openInputModal() {
  inputOverlay.classList.add('open');
  fab.classList.add('open');
  document.getElementById('tpInput').value = '';
  document.getElementById('tpResults').classList.remove('visible');
  setSaveStatus('');
  document.getElementById('tpError').style.display = 'none';
  setTimeout(() => document.getElementById('tpInput').focus(), 120);
}

function closeInputModal() {
  inputOverlay.classList.remove('open');
  fab.classList.remove('open');
}

/* ── Delete phrase ──────────────────────────────────────── */
async function deletePhrase(id, cardEl) {
  if (!confirm('このフレーズを削除しますか？')) return;

  const { error } = await sb.from('phrases_asia').delete().eq('id', id);
  if (error) { showToast('⚠️ 削除に失敗しました'); return; }

  allPhrases = allPhrases.filter(p => p.id !== id);
  document.getElementById('totalCount').textContent = allPhrases.length;

  cardEl.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
  cardEl.style.opacity    = '0';
  cardEl.style.transform  = 'scale(0.96) translateY(-4px)';
  setTimeout(() => { cardEl.remove(); renderCards(); }, 230);

  showToast('🗑 削除しました');
}

/* ── Translation panel ──────────────────────────────────── */
const tpInput  = document.getElementById('tpInput');
const tpBtn    = document.getElementById('tpBtn');
const tpResults= document.getElementById('tpResults');
const tpError  = document.getElementById('tpError');

tpBtn.addEventListener('click', runTranslate);
tpInput.addEventListener('keydown', e => { if (e.key === 'Enter') runTranslate(); });

document.getElementById('tpKoTts').addEventListener('click', function() {
  const text = document.getElementById('tpKo').textContent;
  if (text && text !== '—') speak(text, this);
});

document.getElementById('tpTwTts').addEventListener('click', function() {
  const text = document.getElementById('tpTw').textContent;
  if (text && text !== '—') speak(text, this);
});

async function runTranslate() {
  const text = tpInput.value.trim();
  if (!text) return;

  const apiKey = getOpenAIKey();
  if (!apiKey) {
    showTpError('OpenAI API キーが設定されていません。⚙️ 接続 から設定してください。');
    return;
  }
  if (!sb) {
    showTpError('Supabase に接続されていません。⚙️ 接続 から設定してください。');
    return;
  }

  tpBtn.classList.add('loading');
  tpBtn.disabled = true;
  tpError.style.display = 'none';
  tpResults.classList.remove('visible');
  setSaveStatus('');

  try {
    /* ── Step 1: AI翻訳（フルスペック） ── */
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        temperature: 0.3,
        messages: [
          {
            role: 'system',
            content: `あなたは日本語→韓国語・台湾華語の翻訳専門家です。
以下のJSON形式のみで返答してください（コードブロック・前置き・説明文は一切不要）:
{
  "ko": "韓国語訳（ヘヨ体で自然な表現）",
  "ko_phonetic": "発音を自然なカタカナで（例：アンニョンハセヨ）",
  "tw": "台湾華語訳（繁体字）",
  "tw_phonetic": "正確なピンイン（声調記号あり、例：nǐ hǎo）",
  "words_ko": [
    {"word": "重要単語1（韓国語）", "meaning": "日本語での意味"},
    {"word": "重要単語2（韓国語）", "meaning": "日本語での意味"},
    {"word": "重要単語3（韓国語）", "meaning": "日本語での意味"}
  ],
  "words_tw": [
    {"word": "重要単語1（繁体字）", "meaning": "日本語での意味"},
    {"word": "重要単語2（繁体字）", "meaning": "日本語での意味"},
    {"word": "重要単語3（繁体字）", "meaning": "日本語での意味"}
  ],
  "explanation": "韓国語フレーズの自然さ・文化的ニュアンス・シーン別の使いどころを日本語で解説",
  "explanation_tw": "台湾華語フレーズの自然さ・文化的ニュアンス・シーン別の使いどころを日本語で解説"
}`
          },
          { role: 'user', content: text }
        ]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw  = data.choices?.[0]?.message?.content || '';

    let parsed;
    try {
      const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || raw;
      parsed = JSON.parse(jsonStr);
    } catch {
      throw new Error('AIレスポンスの解析に失敗しました。');
    }

    /* ── Step 2: プレビュー表示 ── */
    document.getElementById('tpKo').textContent         = parsed.ko         || '—';
    document.getElementById('tpKoPhonetic').textContent = parsed.ko_phonetic || '';
    document.getElementById('tpTw').textContent         = parsed.tw         || '—';
    document.getElementById('tpTwPhonetic').textContent = parsed.tw_phonetic || '';
    tpResults.classList.add('visible');

    /* ── Step 3: Supabase に保存 ── */
    setSaveStatus('saving', '保存中...');

    const catId = document.getElementById('tpCategory').value || null;

    const record = {
      japanese:       text,
      korean:         parsed.ko          || '',
      ipa:            parsed.ko_phonetic || '',
      taiwanese:      parsed.tw          || '',
      ipa_tw:         parsed.tw_phonetic || '',
      words:          Array.isArray(parsed.words_ko) ? parsed.words_ko : [],
      words_tw:       Array.isArray(parsed.words_tw) ? parsed.words_tw : [],
      explanation:    parsed.explanation    || '',
      explanation_tw: parsed.explanation_tw || ''
    };
    if (catId) record.category_id = catId;

    const { error: saveErr } = await sb.from('phrases_asia').insert(record);
    if (saveErr) throw new Error('DB保存エラー: ' + saveErr.message);

    /* ── Step 4: 成功 → モーダルを閉じて一覧リロード ── */
    setSaveStatus('success', '✅ 保存しました！');
    showToast('✅ 保存してカードを追加しました');
    tpInput.value = '';
    setTimeout(closeInputModal, 600);
    await loadAll();

  } catch (err) {
    setSaveStatus('error', '⚠️ ' + err.message);
    showTpError(err.message);
  } finally {
    tpBtn.classList.remove('loading');
    tpBtn.disabled = false;
  }
}

function showTpError(msg) {
  tpError.textContent = '⚠️ ' + msg;
  tpError.style.display = 'block';
}

function setSaveStatus(type, msg) {
  const el = document.getElementById('tpSaveStatus');
  el.className = 'tp-save-status';
  el.innerHTML = '';
  if (!type) return;
  el.classList.add(type);
  if (type === 'saving') {
    const spin = document.createElement('span');
    spin.className = 'save-spinner';
    el.appendChild(spin);
  }
  el.appendChild(document.createTextNode(msg));
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Boot ───────────────────────────────────────────────── */
(function init() {
  const cfg = savedConfig();

  if (cfg && cfg.url && cfg.key) {
    initSb(cfg.url, cfg.key);
    loadAll();
  } else {
    setLoading(false);
    showError('Supabase に接続されていません。右上の ⚙️ 接続 ボタンから設定してください。');
    openCfg();
  }
})();
</script>
